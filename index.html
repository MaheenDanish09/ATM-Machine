<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Machine</title>

    <!-- ANIMATE.CSS CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- GOOGLE FONTS CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- BOOTSTRAP CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container container-fluid vh-100 d-flex flex-column justify-content-center align-items-center">
        <!-- LOGIN CARD -->
        <div id="login"
            class="login-card text-center d-flex flex-column justify-content-center align-items-center text-center rounded-5 animate__animated animate__backInUp">
            <h2>Welcome To ABC Bank</h2>
            <input type="password" id="pin" placeholder="Enter your PIN"
                class="w-75 rounded-5 border border-dark-subtle ps-2 mx-auto my-5 py-2">
            <button class="btn btn-outline-secondary btn-light py-2 px-3 rounded-1 fw-bold" onclick="login()">Login</button>
            <p id="login-msg"></p>
        </div>

        <!-- ATM MACHINE -->
        <div id="atm"
            class="atm-card mb-3 rounded-3 d-flex flex-column justify-content-center align-items-center animate__animated animate__fadeInUp d-none">
            <h2 id="text">ATM Machine</h2>
            <input type="number" id="amount" placeholder="Enter an amount"
                class="w-50 rounded-5 border border-light ps-2 mx-auto my-5 py-2 bg-secondary text-white">

            <div class="btns-box my-5">
                <button class="btns btn btn-success btn-outline-light py-2 px-3 fw-semibold me-5 rounded-1" onclick="checkBalance()">Check
                    Balance</button>
                <button
                    class="btns btn btn-primary btn-outline-light py-2 px-3 fw-semibold me-5 rounded-1" onclick="deposit()">Deposit</button>
                <button
                    class="btns btn btn-info btn-outline-light py-2 px-3 fw-semibold me-5 rounded-1" onclick="withdraw()">Withdraw</button>
            </div>
            <button class="btns btn btn-danger btn-outline-light py-2 px-3 fw-semibold me-5 rounded-1" onclick="location.reload()">Exit</button>
        </div>

    </div>

    <!-- BOOTSTRAP JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CUSTOM JS -->
    <script src="index.js"></script>
</body>

</html>
